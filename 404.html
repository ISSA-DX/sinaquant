<!DOCTYPE html>
<!-- =========================================================
     Sinaquant — 404 (/404)
     ------------------------------------------------------------
     Not-found page. In WordPress this is 404.php. The
     `meta name="robots" content="noindex"` tag tells
     search engines not to index this template. The big
     gradient "404" is a -webkit-background-clip:text
     trick (see style.css `.not-found__num`) so the
     numerals adopt the brand Electric→Cyan gradient
     without an image asset.
     ========================================================= -->
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost | Sinaquant</title>
  <meta name="description" content="The page you requested has been de-indexed, retracted, or never existed. Return to the Sinaquant homepage.">
  <meta name="theme-color" content="#070B15">

  <!-- Security headers (static-build equivalent of HTTP headers) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://images.unsplash.com https://*.unsplash.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/svg+xml" href="assets/includes/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" crossorigin="anonymous" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div data-include="header"></div>

<main id="main">

  <section class="container section not-found">
    <div class="not-found__num" aria-hidden="true">404</div>
    <span class="t-meta">Signal Lost</span>
    <h1 class="t-h1" style="margin-top:12px">This intelligence has been retracted.</h1>
    <p class="t-lead" style="max-width:560px;margin:16px auto 0;color:var(--text-2)">
      The page you requested was de-indexed, redacted, or never existed. Return to the Sinaquant homepage, or browse the latest intelligence feed.
    </p>
    <div class="not-found__actions">
      <a class="btn btn-primary" href="index.html">
        Back to Home
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a class="btn btn-ghost" href="news.html">Browse News Feed</a>
    </div>
  </section>

</main>

<div data-include="footer"></div>

<script src="js/includes.js"></script>
<script src="js/main.js"></script>
</body>
</html>
