<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="Sinaquant logo">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#45EDF6"/>
      <stop offset="60%" stop-color="#319CE7"/>
      <stop offset="100%" stop-color="#2D5CE8"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#070B15"/>
  <g fill="none" stroke="url(#g)" stroke-width="1.6" filter="url(#glow)">
    <!-- Neural network nodes forming a stylized "S" -->
    <circle cx="16" cy="14" r="2.5" fill="#45EDF6"/>
    <circle cx="48" cy="14" r="2.5" fill="#45EDF6"/>
    <circle cx="16" cy="32" r="2.5" fill="#45EDF6"/>
    <circle cx="48" cy="32" r="2.5" fill="#45EDF6"/>
    <circle cx="16" cy="50" r="2.5" fill="#45EDF6"/>
    <circle cx="48" cy="50" r="2.5" fill="#45EDF6"/>
    <circle cx="32" cy="22" r="2" fill="#A7F3FB"/>
    <circle cx="32" cy="42" r="2" fill="#A7F3FB"/>
    <line x1="16" y1="14" x2="32" y2="22"/>
    <line x1="48" y1="14" x2="32" y2="22"/>
    <line x1="32" y1="22" x2="32" y2="42"/>
    <line x1="32" y1="42" x2="16" y2="50"/>
    <line x1="32" y1="42" x2="48" y2="50"/>
    <line x1="16" y1="14" x2="16" y2="32"/>
    <line x1="48" y1="32" x2="48" y2="50"/>
    <line x1="16" y1="32" x2="48" y2="32"/>
  </g>
</svg>
